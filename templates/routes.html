<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>커뮤니티 코스 — CultureRoute</title>
<link rel="icon" type="image/svg+xml" href="/static/culture/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
{% if KAKAO_JS_KEY %}<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey={{ KAKAO_JS_KEY }}&autoload=false"></script>{% endif %}
<style>
  :root {
    --ink: #0E1520; --paper: #EBEBEB; --accent: #10367D; --accent-lt: #1D49A6;
    --gold: #B8902A; --muted: #626A82; --white: #FFFFFF;
    --border: #C8C8D4; --border-lt: #DDDDE8; --navy-wash: #E6EAF4;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--paper); color: var(--ink); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg width='56' height='56' viewBox='0 0 56 56' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%2310367D' stroke-width='0.4' opacity='1'%3E%3Crect x='14' y='14' width='28' height='28' transform='rotate(45 28 28)'/%3E%3C/g%3E%3C/svg%3E"); opacity: 0.055; pointer-events: none; z-index: 0; }

  /* ── NAV ── */
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 18px 52px; background: rgba(235,235,235,0.90); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); }
  .logo { font-family: 'Noto Serif KR', serif; font-size: 17px; font-weight: 600; color: var(--ink); text-decoration: none; display: flex; align-items: center; gap: 6px; }
  .logo-mark { width: 22px; height: 22px; border: 1.5px solid var(--accent); display: inline-flex; align-items: center; justify-content: center; font-size: 11px; color: var(--accent); font-family: 'Noto Serif KR', serif; font-weight: 600; }
  .logo span { color: var(--accent); }
  nav ul { list-style: none; display: flex; gap: 38px; }
  nav ul a { font-size: 12.5px; font-weight: 400; letter-spacing: 0.05em; color: var(--muted); text-decoration: none; transition: color 0.2s; position: relative; }
  nav ul a::after { content: ''; position: absolute; bottom: -3px; left: 0; right: 0; height: 1px; background: var(--accent); transform: scaleX(0); transition: transform 0.2s; }
  nav ul a:hover, nav ul a.active { color: var(--accent); }
  nav ul a:hover::after, nav ul a.active::after { transform: scaleX(1); }
  .btn-primary { display: inline-flex; align-items: center; padding: 9px 22px; background: var(--accent); color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 11.5px; letter-spacing: 0.08em; text-decoration: none; border: 1.5px solid var(--accent); cursor: pointer; transition: background 0.22s; }
  .btn-primary:hover { background: var(--accent-lt); }

  /* ── PAGE HEADER ── */
  .page-header { padding: 112px 52px 48px; position: relative; z-index: 1; border-bottom: 1px solid var(--border); background: var(--white); display: flex; align-items: flex-end; justify-content: space-between; }
  .page-eyebrow { font-size: 10px; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
  .page-eyebrow::before { content: ''; display: block; width: 20px; height: 1px; background: var(--accent); flex-shrink: 0; }
  .page-title { font-family: 'Noto Serif KR', serif; font-size: 38px; font-weight: 300; letter-spacing: -0.025em; }
  .page-desc { font-size: 13px; color: var(--muted); margin-top: 10px; line-height: 1.75; }
  .create-btn { padding: 12px 28px; background: var(--accent); color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 11.5px; letter-spacing: 0.08em; border: none; cursor: pointer; transition: background 0.2s; white-space: nowrap; flex-shrink: 0; margin-left: 52px; }
  .create-btn:hover { background: var(--accent-lt); }

  /* ── ROUTE GRID ── */
  .routes-body { padding: 0 0 80px; position: relative; z-index: 1; }
  .route-grid { display: grid; grid-template-columns: repeat(2, 1fr); border-top: 1px solid var(--border); }
  .route-card { padding: 36px 40px; background: var(--white); border-right: 1px solid var(--border-lt); border-bottom: 1px solid var(--border-lt); position: relative; overflow: hidden; }
  .route-card:nth-child(2n) { border-right: none; }
  .route-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: linear-gradient(to bottom, var(--accent), rgba(16,54,125,0.2)); transform: scaleY(0); transform-origin: top; transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); }
  .route-card:hover::before { transform: scaleY(1); }
  .route-card:hover { background: var(--navy-wash); }
  .route-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
  .route-title { font-family: 'Noto Serif KR', serif; font-size: 20px; font-weight: 400; color: var(--ink); line-height: 1.3; }
  .route-mode { font-size: 9.5px; letter-spacing: 0.14em; padding: 4px 12px; border: 1px solid var(--border); color: var(--muted); text-transform: uppercase; flex-shrink: 0; margin-left: 12px; margin-top: 2px; }
  .route-meta { display: flex; gap: 20px; margin-bottom: 18px; }
  .route-meta-item { font-size: 11.5px; color: var(--muted); }
  .route-meta-item strong { color: var(--ink); font-weight: 400; }
  .route-places { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
  .place-chip { font-size: 10.5px; padding: 4px 11px; background: var(--paper); border: 1px solid var(--border-lt); color: var(--muted); }
  .route-footer { display: flex; align-items: center; justify-content: space-between; }
  .route-author { font-size: 11px; color: var(--muted); }
  .like-btn { display: flex; align-items: center; gap: 6px; padding: 7px 16px; border: 1px solid var(--border); background: var(--white); font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--muted); cursor: pointer; transition: all 0.2s; }
  .like-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--navy-wash); }
  .like-btn.liked { border-color: var(--accent); color: var(--accent); background: var(--navy-wash); }
  .like-icon { font-size: 14px; }

  /* ── STATES ── */
  .state-box { grid-column: 1 / -1; padding: 80px 52px; text-align: center; color: var(--muted); }
  .state-char { font-family: 'Noto Serif KR', serif; font-size: 52px; color: rgba(16,54,125,0.12); margin-bottom: 16px; }

  /* ── CREATE MODAL ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(14,21,32,0.55); z-index: 200; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--white); width: 560px; max-height: 80vh; overflow-y: auto; padding: 48px; border: 1px solid var(--border); }
  .modal-title { font-family: 'Noto Serif KR', serif; font-size: 24px; font-weight: 300; margin-bottom: 32px; }
  .modal-close { position: absolute; top: 16px; right: 20px; font-size: 20px; background: none; border: none; cursor: pointer; color: var(--muted); }
  .modal { position: relative; }
  .form-group { margin-bottom: 20px; }
  .form-label { font-size: 10px; letter-spacing: 0.16em; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; display: block; }
  .form-input { width: 100%; padding: 12px 16px; border: 1px solid var(--border); background: var(--paper); font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); }
  .form-input:focus { outline: none; border-color: var(--accent); }
  .form-select { width: 100%; padding: 12px 16px; border: 1px solid var(--border); background: var(--paper); font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); appearance: none; cursor: pointer; }
  .form-select:focus { outline: none; border-color: var(--accent); }
  .form-hint { font-size: 11px; color: var(--muted); margin-top: 5px; }
  .form-actions { display: flex; gap: 12px; margin-top: 28px; }
  .submit-btn { padding: 12px 28px; background: var(--accent); color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 12px; letter-spacing: 0.08em; border: none; cursor: pointer; transition: background 0.2s; }
  .submit-btn:hover { background: var(--accent-lt); }
  .cancel-btn { padding: 12px 28px; background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 12px; letter-spacing: 0.08em; border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; }
  .cancel-btn:hover { border-color: var(--accent); color: var(--accent); }
  .form-msg { margin-top: 12px; font-size: 13px; color: var(--accent); }
  .form-msg.error { color: #c0392b; }
  .auth-notice { padding: 28px; background: var(--navy-wash); border: 1px solid rgba(16,54,125,0.15); text-align: center; }
  .auth-notice p { font-size: 13px; color: var(--accent); }
  .auth-notice a { color: var(--accent); font-weight: 400; text-decoration: underline; }
  .checkbox-wrap { display: flex; align-items: center; gap: 10px; }
  .checkbox-wrap input { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
  .checkbox-wrap label { font-size: 13px; color: var(--muted); cursor: pointer; }

  /* ── PLACE PICKER ── */
  .place-picker { border: 1px solid var(--border); margin-top: 2px; }
  .picker-search { width: 100%; padding: 9px 14px; border: none; border-bottom: 1px solid var(--border); font-family: 'DM Sans', sans-serif; font-size: 13px; background: var(--paper); outline: none; color: var(--ink); }
  .picker-search::placeholder { color: var(--muted); }
  .picker-list { max-height: 220px; overflow-y: auto; }
  .picker-item { display: flex; align-items: center; gap: 10px; padding: 9px 14px; cursor: pointer; transition: background .15s; }
  .picker-item:hover { background: var(--navy-wash); }
  .picker-item.checked { background: rgba(16,54,125,.05); }
  .picker-item input[type=checkbox] { cursor: pointer; accent-color: var(--accent); width: 15px; height: 15px; flex-shrink: 0; }
  .picker-name { font-size: 13px; color: var(--ink); flex: 1; }
  .picker-region { font-size: 11px; color: var(--muted); flex-shrink: 0; }

  /* ── EDIT / DELETE BUTTON ── */
  .route-edit-btn { display: none; padding: 5px 12px; border: 1px solid var(--border); background: var(--white); font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--muted); cursor: pointer; transition: all 0.2s; margin-left: auto; }
  .route-edit-btn:hover { border-color: var(--accent); color: var(--accent); }
  .route-edit-btn.visible { display: inline-flex; }
  .route-del-btn { display: none; padding: 5px 12px; border: 1px solid #e0c0c0; background: var(--white); font-family: 'DM Sans', sans-serif; font-size: 11px; color: #c0392b; cursor: pointer; transition: all 0.2s; margin-left: 6px; }
  .route-del-btn:hover { background: #fdf0f0; border-color: #c0392b; }
  .route-del-btn.visible { display: inline-flex; }

  /* ── COMMENTS ── */
  .comments-toggle { width: 100%; padding: 10px 0; border: none; border-top: 1px solid var(--border-lt); background: none; font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--muted); cursor: pointer; display: flex; align-items: center; gap: 6px; transition: color 0.2s; margin-top: 12px; }
  .comments-toggle:hover { color: var(--accent); }
  .comments-section { display: none; margin-top: 12px; }
  .comments-section.open { display: block; }
  .comment-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; max-height: 240px; overflow-y: auto; }
  .comment-item { padding: 10px 14px; background: var(--paper); border: 1px solid var(--border-lt); display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .comment-meta { font-size: 10.5px; color: var(--accent); font-weight: 400; margin-bottom: 3px; }
  .comment-text { font-size: 12.5px; color: var(--ink); line-height: 1.55; }
  .comment-del { font-size: 11px; color: var(--muted); background: none; border: none; cursor: pointer; flex-shrink: 0; padding: 2px 4px; }
  .comment-del:hover { color: var(--danger, #c0392b); }
  .comment-form { display: flex; gap: 8px; }
  .comment-input { flex: 1; padding: 9px 12px; border: 1px solid var(--border); background: var(--white); font-family: 'DM Sans', sans-serif; font-size: 12.5px; color: var(--ink); }
  .comment-input:focus { outline: none; border-color: var(--accent); }
  .comment-send { padding: 9px 18px; background: var(--accent); color: var(--white); border: none; font-family: 'DM Sans', sans-serif; font-size: 11.5px; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
  .comment-send:hover { background: var(--accent-lt); }

  /* ── MAP MODAL ── */
  .map-modal-overlay { position:fixed; inset:0; background:rgba(14,21,32,.6); z-index:300; display:none; align-items:center; justify-content:center; backdrop-filter:blur(6px); }
  .map-modal-overlay.open { display:flex; }
  .map-modal { background:var(--white); width:780px; max-width:96vw; border:1px solid var(--border); position:relative; }
  .map-modal-header { padding:20px 28px; border-bottom:1px solid var(--border-lt); display:flex; align-items:center; justify-content:space-between; }
  .map-modal-title { font-family:'Noto Serif KR',serif; font-size:18px; font-weight:300; }
  .map-modal-close { background:none; border:none; font-size:20px; cursor:pointer; color:var(--muted); padding:4px 8px; transition:color .2s; }
  .map-modal-close:hover { color:var(--accent); }
  #route-kakao-map { width:100%; height:440px; }
  .map-modal-stops { padding:16px 28px; border-top:1px solid var(--border-lt); display:flex; gap:8px; flex-wrap:wrap; }
  .map-stop-chip { display:inline-flex; align-items:center; gap:5px; font-size:11.5px; color:var(--muted); }
  .map-stop-num { width:18px; height:18px; background:var(--accent); color:#fff; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:9.5px; font-family:'DM Sans',sans-serif; font-weight:500; flex-shrink:0; }
  .map-btn { padding:5px 12px; border:1px solid var(--border); background:var(--white); font-family:'DM Sans',sans-serif; font-size:11px; color:var(--muted); cursor:pointer; transition:all .2s; }
  .map-btn:hover { border-color:var(--accent); color:var(--accent); }

  /* ── FOOTER ── */
  footer { border-top: 1px solid var(--border); padding: 52px; display: flex; align-items: center; justify-content: space-between; background: var(--accent); position: relative; z-index: 1; overflow: hidden; }
  footer::before { content: ''; position: absolute; inset: 0; background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23ffffff' stroke-width='0.4' opacity='1'%3E%3Crect x='10' y='10' width='20' height='20' transform='rotate(45 20 20)'/%3E%3C/g%3E%3C/svg%3E"); opacity: 0.06; pointer-events: none; }
  .footer-logo { font-family: 'Noto Serif KR', serif; font-size: 16px; color: white; display: flex; align-items: center; gap: 7px; position: relative; z-index: 1; }
  .footer-logo .logo-mark { border-color: rgba(255,255,255,0.5); color: rgba(255,255,255,0.7); }
  .footer-logo span { color: rgba(255,255,255,0.55); }
  .footer-copy { font-size: 12px; color: rgba(255,255,255,0.4); position: relative; z-index: 1; }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="/" class="logo">
    <span class="logo-mark">文</span>
    Culture<span>Route</span>
  </a>
  <ul>
    <li><a href="/places/">문화 장소</a></li>
    <li><a href="/routes/" class="active">커뮤니티</a></li>
    <li><a href="/ai/">AI 챗봇</a></li>
  </ul>
  <div id="nav-auth" style="display:flex;align-items:center;gap:10px">
    <a href="/login/" class="btn-primary">로그인</a>
  </div>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
  <div>
    <p class="page-eyebrow">커뮤니티</p>
    <h1 class="page-title">공유 코스</h1>
    <p class="page-desc">다른 유저들이 만든 동선 코스를 탐색하고 나만의 코스를 공유해 보세요.</p>
  </div>
  <button class="create-btn" id="open-modal">+ 코스 만들기</button>
</div>

<!-- ROUTES GRID -->
<div class="routes-body">
  <div class="route-grid" id="route-grid">
    <div class="state-box">
      <div class="state-char">路</div>
      <p>코스를 불러오는 중…</p>
    </div>
  </div>
</div>

<!-- MAP MODAL -->
<div class="map-modal-overlay" id="map-modal-overlay">
  <div class="map-modal">
    <div class="map-modal-header">
      <span class="map-modal-title" id="map-modal-title">동선 지도</span>
      <button class="map-modal-close" onclick="closeRouteMap()">✕</button>
    </div>
    <div id="route-kakao-map"></div>
    <div class="map-modal-stops" id="map-modal-stops"></div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <div class="footer-logo">
    <span class="logo-mark">文</span>
    Culture<span>Route</span>
  </div>
  <p class="footer-copy">© 2025 CultureRoute · 서울6반 1조</p>
</footer>

<!-- CREATE MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-content">
    <button class="modal-close" id="close-modal">✕</button>
    <h2 class="modal-title" id="modal-title">코스 만들기</h2>
    <div id="modal-body">
      <div style="text-align:center;padding:20px;color:var(--muted);font-size:13px">인증 확인 중…</div>
    </div>
  </div>
</div>

<script>
function getCsrfToken() {
  return document.cookie.split(';').find(r => r.trim().startsWith('csrftoken='))?.split('=')[1] || '';
}

/* ── nav 인증 ── */
async function initNav() {
  try {
    const res = await fetch('/api/accounts/me/');
    const nav = document.getElementById('nav-auth');
    if (res.ok) {
      const u = await res.json();
      meId = u.id;
      window._meUsername = u.username;
      nav.innerHTML = `
        <a href="/accounts/profile/${u.username}/" style="font-size:12px;color:var(--muted);letter-spacing:.03em;text-decoration:none">${u.username} 님</a>
        <button onclick="doLogout()" style="padding:8px 18px;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11.5px;letter-spacing:.06em;border:1px solid var(--border);cursor:pointer;transition:all .2s" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">로그아웃</button>`;
    } else {
      nav.innerHTML = `<a href="/login/?next=${encodeURIComponent(location.pathname)}" style="display:inline-flex;align-items:center;padding:9px 22px;background:var(--accent);color:#fff;font-family:'DM Sans',sans-serif;font-size:11.5px;letter-spacing:.08em;text-decoration:none;border:1.5px solid var(--accent)">로그인</a>`;
    }
  } catch(e) {}
}
async function doLogout() {
  await fetch('/api/accounts/logout/', {method:'POST', headers:{'X-CSRFToken':getCsrfToken()}});
  location.href = '/';
}

const MODE_LABELS = {distance:'거리 기준',theme:'테마 기준',time:'소요시간 기준'};

let meId = null; // 로그인 유저 id (null = 비로그인)

function routeCardHTML(r) {
  const places = r.route_places || [];
  const placeChips = places.slice(0, 4).map(rp =>
    `<span class="place-chip">${rp.place?.name || '—'}</span>`
  ).join('') + (places.length > 4 ? `<span class="place-chip">+${places.length - 4}</span>` : '');

  const dist = r.total_distance ? `${(r.total_distance / 1000).toFixed(1)}km` : '—';
  const time = r.total_time ? `${r.total_time}분` : '—';
  const isOwner = meId && meId === r.user_id;
  const liked = r.liked_by_me;
  const commentCount = r.comment_count || 0;

  return `<div class="route-card" data-id="${r.id}">
    <div class="route-header">
      <h3 class="route-title">${r.title}</h3>
      <span class="route-mode">${MODE_LABELS[r.mode] || r.mode}</span>
      <button class="route-edit-btn${isOwner ? ' visible' : ''}" onclick="openEditModal(${r.id})">수정</button>
      <button class="route-del-btn${isOwner ? ' visible' : ''}" onclick="deleteRoute(event, ${r.id})">삭제</button>
    </div>
    <div class="route-meta">
      <span class="route-meta-item"><strong>${r.place_count || places.length}</strong>개 장소</span>
      <span class="route-meta-item">거리 <strong>${dist}</strong></span>
      <span class="route-meta-item">소요 <strong>${time}</strong></span>
    </div>
    ${placeChips ? `<div class="route-places">${placeChips}</div>` : ''}
    <div class="route-footer">
      <a href="/accounts/profile/${r.username}/" style="font-size:11px;color:var(--muted);text-decoration:none" class="route-author">${r.username}</a>
      <div style="display:flex;align-items:center;gap:8px">
        <button class="map-btn" onclick="openRouteMap(${r.id},'${r.title.replace(/'/g,'\\'')}')">지도 보기</button>
        <button class="like-btn${liked ? ' liked' : ''}" data-id="${r.id}">
          <span class="like-icon">${liked ? '♥' : '♡'}</span>
          <span class="like-count">${r.like_count}</span>
        </button>
      </div>
    </div>
    <button class="comments-toggle" onclick="toggleComments(${r.id}, this)">
      💬 댓글 <strong id="cnt-${r.id}">${commentCount}</strong>개
    </button>
    <div class="comments-section" id="comments-${r.id}">
      <div class="comment-list" id="clist-${r.id}"></div>
      <div class="comment-form" id="cform-${r.id}">
        <input class="comment-input" id="cinput-${r.id}" placeholder="댓글을 입력하세요…" maxlength="200">
        <button class="comment-send" onclick="postComment(${r.id})">등록</button>
      </div>
    </div>
  </div>`;
}

async function fetchRoutes() {
  const grid = document.getElementById('route-grid');
  grid.innerHTML = '<div class="state-box"><p>⏳ 불러오는 중…</p></div>';
  try {
    const res = await fetch('/api/routes/');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (!Array.isArray(data) || !data.length) {
      grid.innerHTML = '<div class="state-box"><div class="state-char">路</div><p>공유된 코스가 없습니다.<br>첫 번째 코스를 만들어 보세요!</p></div>';
      return;
    }
    let cards;
    try {
      cards = data.map(routeCardHTML);
    } catch(renderErr) {
      grid.innerHTML = `<div class="state-box"><p>렌더링 오류: ${renderErr.message}</p></div>`;
      return;
    }
    grid.innerHTML = cards.join('');
    attachLikeListeners();
  } catch(e) {
    grid.innerHTML = `<div class="state-box"><p>오류: ${e.message}</p></div>`;
  }
}

function attachLikeListeners() {
  document.querySelectorAll('.like-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const id = btn.dataset.id;
      try {
        const res = await fetch(`/api/routes/${id}/like/`, {
          method: 'POST',
          headers: { 'X-CSRFToken': getCsrfToken() }
        });
        if (res.status === 401) { alert('좋아요는 로그인 후 이용 가능합니다.'); return; }
        if (res.ok) {
          const data = await res.json();
          btn.querySelector('.like-count').textContent = data.like_count;
          if (data.liked) {
            btn.querySelector('.like-icon').textContent = '♥';
            btn.classList.add('liked');
          } else {
            btn.querySelector('.like-icon').textContent = '♡';
            btn.classList.remove('liked');
          }
        }
      } catch(e) {}
    });
  });
}

/* ── 댓글 ── */
async function toggleComments(routeId, toggleBtn) {
  const section = document.getElementById(`comments-${routeId}`);
  const isOpen = section.classList.contains('open');
  section.classList.toggle('open');
  if (!isOpen) await loadComments(routeId);
}

async function loadComments(routeId) {
  const list = document.getElementById(`clist-${routeId}`);
  list.innerHTML = '<p style="font-size:12px;color:var(--muted);padding:8px 0">불러오는 중…</p>';
  try {
    const res = await fetch(`/api/routes/${routeId}/comments/`);
    const comments = await res.json();
    renderComments(routeId, comments);
  } catch(e) {
    list.innerHTML = '<p style="font-size:12px;color:var(--muted)">댓글을 불러올 수 없습니다.</p>';
  }
}

function renderComments(routeId, comments) {
  const list = document.getElementById(`clist-${routeId}`);
  const cnt = document.getElementById(`cnt-${routeId}`);
  if (cnt) cnt.textContent = comments.length;
  if (!comments.length) {
    list.innerHTML = '<p style="font-size:12px;color:var(--muted);padding:8px 0">첫 번째 댓글을 남겨보세요.</p>';
    return;
  }
  list.innerHTML = comments.map(c => {
    const canDel = meId && c.username === (window._meUsername || '');
    return `<div class="comment-item" id="cmitem-${c.id}">
      <div style="flex:1">
        <div class="comment-meta">${c.username}</div>
        <div class="comment-text">${c.content.replace(/</g,'&lt;')}</div>
      </div>
      ${canDel ? `<button class="comment-del" onclick="deleteComment(${routeId},${c.id})">✕</button>` : ''}
    </div>`;
  }).join('');
}

async function postComment(routeId) {
  const input = document.getElementById(`cinput-${routeId}`);
  const content = input.value.trim();
  if (!content) return;
  try {
    const res = await fetch(`/api/routes/${routeId}/comments/`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrfToken() },
      body: JSON.stringify({ content })
    });
    if (res.status === 401) { alert('댓글은 로그인 후 이용 가능합니다.'); return; }
    if (res.ok) {
      input.value = '';
      await loadComments(routeId);
    }
  } catch(e) {}
}

async function deleteComment(routeId, commentId) {
  try {
    const res = await fetch(`/api/routes/${routeId}/comments/${commentId}/`, {
      method: 'DELETE',
      headers: { 'X-CSRFToken': getCsrfToken() }
    });
    if (res.ok) {
      const el = document.getElementById(`cmitem-${commentId}`);
      if (el) el.remove();
      await loadComments(routeId);
    }
  } catch(e) {}
}

/* ── 코스 수정 모달 ── */
let editRouteId = null;

async function openEditModal(routeId) {
  editRouteId = routeId;
  document.getElementById('modal-title').textContent = '코스 수정';
  openModal();
  const body = document.getElementById('modal-body');
  body.innerHTML = '<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px">불러오는 중…</div>';

  const [routeRes, placesRes] = await Promise.all([
    fetch(`/api/routes/${routeId}/`),
    fetch('/api/places/'),
  ]);
  if (!routeRes.ok) { body.innerHTML = '<p style="color:var(--muted)">코스 정보를 불러올 수 없습니다.</p>'; return; }

  const route = await routeRes.json();
  const places = await placesRes.json();
  const currentPlaceIds = (route.route_places || []).map(rp => rp.place?.id);

  body.innerHTML = `
    <div class="form-group">
      <label class="form-label">코스 이름</label>
      <input class="form-input" id="e-title" type="text" value="${route.title || ''}">
    </div>
    <div class="form-group">
      <label class="form-label">추천 모드</label>
      <select class="form-select" id="e-mode">
        <option value="distance"${route.mode==='distance'?' selected':''}>거리 기준</option>
        <option value="theme"${route.mode==='theme'?' selected':''}>테마 기준</option>
        <option value="time"${route.mode==='time'?' selected':''}>소요시간 기준</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">장소 선택 (2개 이상, 방문 순서대로)</label>
      ${buildPlacePicker(places, currentPlaceIds)}
    </div>
    <div class="form-group">
      <label class="form-label">총 거리 (m)</label>
      <input class="form-input" id="e-distance" type="number" min="0" value="${route.total_distance || 0}">
    </div>
    <div class="form-group">
      <label class="form-label">총 소요시간 (분)</label>
      <input class="form-input" id="e-time" type="number" min="0" value="${route.total_time || 0}">
    </div>
    <div class="form-group">
      <div class="checkbox-wrap">
        <input type="checkbox" id="e-shared"${route.is_shared?' checked':''}>
        <label for="e-shared">커뮤니티에 공유하기</label>
      </div>
    </div>
    <div class="form-actions">
      <button class="submit-btn" id="submit-edit">수정 저장</button>
      <button class="cancel-btn" onclick="closeModal()">취소</button>
    </div>
    <p class="form-msg" id="edit-msg"></p>`;

  document.getElementById('submit-edit').addEventListener('click', submitEdit);
}

async function submitEdit() {
  const title = document.getElementById('e-title').value.trim();
  const mode = document.getElementById('e-mode').value;
  const selected = getPickerSelected();
  const dist = +document.getElementById('e-distance').value || 0;
  const time = +document.getElementById('e-time').value || 0;
  const is_shared = document.getElementById('e-shared').checked;
  const msg = document.getElementById('edit-msg');

  if (!title) { msg.textContent = '코스 이름을 입력해 주세요.'; msg.className = 'form-msg error'; return; }
  if (selected.length < 2) { msg.textContent = '장소를 2개 이상 선택해 주세요.'; msg.className = 'form-msg error'; return; }

  try {
    const res = await fetch(`/api/routes/${editRouteId}/`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrfToken() },
      body: JSON.stringify({ title, mode, total_distance: dist, total_time: time, is_shared, place_ids: selected })
    });
    if (res.ok) {
      msg.textContent = '수정되었습니다!';
      msg.className = 'form-msg';
      setTimeout(() => { closeModal(); fetchRoutes(); document.getElementById('modal-title').textContent = '코스 만들기'; editRouteId = null; }, 1000);
    } else {
      const err = await res.json();
      msg.textContent = Object.values(err).flat().join(' ');
      msg.className = 'form-msg error';
    }
  } catch(e) {
    msg.textContent = '오류가 발생했습니다.';
    msg.className = 'form-msg error';
  }
}

async function loadPlaceOptions() {
  const res = await fetch('/api/places/');
  if (!res.ok) return [];
  return await res.json();
}

function buildPlacePicker(places, selectedIds = []) {
  const items = places.map(p => {
    const checked = selectedIds.includes(p.id);
    return `<label class="picker-item${checked ? ' checked' : ''}">
      <input type="checkbox" value="${p.id}"${checked ? ' checked' : ''}
        onchange="this.closest('.picker-item').classList.toggle('checked',this.checked)">
      <span class="picker-name">${p.name}</span>
      <span class="picker-region">${p.region_display}</span>
    </label>`;
  }).join('');
  return `<div class="place-picker">
    <input class="picker-search" type="text" placeholder="장소 이름 또는 지역 검색…" oninput="filterPicker(this)">
    <div class="picker-list" id="picker-list">${items}</div>
  </div>
  <p class="form-hint">방문할 장소를 선택하세요 (2개 이상, 순서대로)</p>`;
}

function filterPicker(input) {
  const q = input.value.toLowerCase();
  document.querySelectorAll('#picker-list .picker-item').forEach(item => {
    const name = item.querySelector('.picker-name').textContent.toLowerCase();
    const region = item.querySelector('.picker-region').textContent.toLowerCase();
    item.style.display = (name.includes(q) || region.includes(q)) ? '' : 'none';
  });
}

function getPickerSelected() {
  return Array.from(document.querySelectorAll('#picker-list .picker-item input:checked')).map(i => +i.value);
}

/* ── 코스 삭제 ── */
async function deleteRoute(event, routeId) {
  event.stopPropagation();
  if (!confirm('정말 삭제하시겠습니까?')) return;
  try {
    const res = await fetch(`/api/routes/${routeId}/`, {
      method: 'DELETE',
      headers: { 'X-CSRFToken': getCsrfToken() },
    });
    if (res.status === 204) {
      const card = document.querySelector(`.route-card[data-id="${routeId}"]`);
      if (card) card.remove();
    } else if (res.status === 403) {
      alert('본인이 작성한 코스만 삭제할 수 있습니다.');
    } else {
      alert('삭제 중 오류가 발생했습니다.');
    }
  } catch (e) {
    alert('삭제 중 오류가 발생했습니다.');
  }
}

async function renderCreateForm() {
  const body = document.getElementById('modal-body');
  const meRes = await fetch('/api/accounts/me/').catch(() => ({ok:false}));
  const isAuth = meRes.ok;
  if (!isAuth) {
    body.innerHTML = `<div class="auth-notice">
      <p>코스를 만들려면 <a href="/login/?next=/routes/">로그인</a>이 필요합니다.</p>
    </div>`;
    return;
  }

  const places = await loadPlaceOptions();

  body.innerHTML = `
    <div class="form-group">
      <label class="form-label">코스 이름</label>
      <input class="form-input" id="c-title" type="text" placeholder="나만의 코스 이름을 입력해 주세요">
    </div>
    <div class="form-group">
      <label class="form-label">추천 모드</label>
      <select class="form-select" id="c-mode">
        <option value="distance">거리 기준</option>
        <option value="theme">테마 기준</option>
        <option value="time">소요시간 기준</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">장소 선택 (2개 이상, 방문 순서대로)</label>
      ${buildPlacePicker(places)}
    </div>
    <div class="form-group">
      <label class="form-label">총 거리 (m, 선택)</label>
      <input class="form-input" id="c-distance" type="number" min="0" placeholder="예: 3500">
    </div>
    <div class="form-group">
      <label class="form-label">총 소요시간 (분, 선택)</label>
      <input class="form-input" id="c-time" type="number" min="0" placeholder="예: 120">
    </div>
    <div class="form-group">
      <div class="checkbox-wrap">
        <input type="checkbox" id="c-shared" checked>
        <label for="c-shared">커뮤니티에 공유하기</label>
      </div>
    </div>
    <div class="form-actions">
      <button class="submit-btn" id="submit-route">코스 등록</button>
      <button class="cancel-btn" id="cancel-route">취소</button>
    </div>
    <p class="form-msg" id="route-msg"></p>`;

  document.getElementById('cancel-route').addEventListener('click', closeModal);

  document.getElementById('submit-route').addEventListener('click', async () => {
    const title = document.getElementById('c-title').value.trim();
    const mode = document.getElementById('c-mode').value;
    const selected = getPickerSelected();
    const dist = +document.getElementById('c-distance').value || 0;
    const time = +document.getElementById('c-time').value || 0;
    const is_shared = document.getElementById('c-shared').checked;
    const msg = document.getElementById('route-msg');

    if (!title) { msg.textContent = '코스 이름을 입력해 주세요.'; msg.className = 'form-msg error'; return; }
    if (selected.length < 2) { msg.textContent = '장소를 2개 이상 선택해 주세요.'; msg.className = 'form-msg error'; return; }

    try {
      const res = await fetch('/api/routes/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrfToken() },
        body: JSON.stringify({ title, mode, total_distance: dist, total_time: time, is_shared, place_ids: selected })
      });
      if (res.status === 201) {
        msg.textContent = '코스가 등록되었습니다!';
        msg.className = 'form-msg';
        setTimeout(() => { closeModal(); fetchRoutes(); }, 1200);
      } else {
        const err = await res.json();
        msg.textContent = Object.values(err).flat().join(' ');
        msg.className = 'form-msg error';
      }
    } catch(e) {
      msg.textContent = '오류가 발생했습니다. 다시 시도해 주세요.';
      msg.className = 'form-msg error';
    }
  });
}

function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
  if (!editRouteId) renderCreateForm();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

document.getElementById('open-modal').addEventListener('click', () => {
  editRouteId = null;
  document.getElementById('modal-title').textContent = '코스 만들기';
  openModal();
});
document.getElementById('close-modal').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

/* ── 동선 지도 모달 ── */
let _routeMapInstance = null;

function closeRouteMap() {
  document.getElementById('map-modal-overlay').classList.remove('open');
}

async function openRouteMap(routeId, title) {
  document.getElementById('map-modal-title').textContent = title || '동선 지도';
  document.getElementById('map-modal-overlay').classList.add('open');
  document.getElementById('map-modal-stops').innerHTML = '';
  document.getElementById('route-kakao-map').innerHTML =
    '<div style="display:flex;align-items:center;justify-content:center;height:440px;color:var(--muted);font-size:13px">지도를 불러오는 중…</div>';

  try {
    const res = await fetch(`/api/routes/${routeId}/`);
    if (!res.ok) throw new Error();
    const route = await res.json();
    const stops = (route.route_places || [])
      .sort((a, b) => a.order - b.order)
      .map(rp => rp.place)
      .filter(p => p && p.latitude && p.longitude);

    if (!stops.length) {
      document.getElementById('route-kakao-map').innerHTML =
        '<div style="display:flex;align-items:center;justify-content:center;height:440px;color:var(--muted);font-size:13px">위치 정보가 없습니다.</div>';
      return;
    }

    if (!window.kakao || !window.kakao.maps) {
      document.getElementById('route-kakao-map').innerHTML =
        '<div style="display:flex;align-items:center;justify-content:center;height:440px;color:var(--muted);font-size:13px">지도를 불러올 수 없습니다.</div>';
      return;
    }

    kakao.maps.load(() => {
      const container = document.getElementById('route-kakao-map');
      container.innerHTML = '';
      const center = new kakao.maps.LatLng(+stops[0].latitude, +stops[0].longitude);
      const map = new kakao.maps.Map(container, { center, level: 6 });
      _routeMapInstance = map;

      const path = stops.map(p => new kakao.maps.LatLng(+p.latitude, +p.longitude));

      new kakao.maps.Polyline({
        path,
        strokeWeight: 3,
        strokeColor: '#10367D',
        strokeOpacity: 0.8,
        strokeStyle: 'solid',
        map
      });

      stops.forEach((p, i) => {
        const overlayContent = `<div style="width:26px;height:26px;background:var(--accent,#10367D);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;font-family:'DM Sans',sans-serif;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3);cursor:pointer" title="${p.name}">${i+1}</div>`;
        new kakao.maps.CustomOverlay({
          position: new kakao.maps.LatLng(+p.latitude, +p.longitude),
          content: overlayContent,
          yAnchor: 1.2,
          map
        });
      });

      const bounds = new kakao.maps.LatLngBounds();
      path.forEach(pt => bounds.extend(pt));
      map.setBounds(bounds);

      document.getElementById('map-modal-stops').innerHTML = stops.map((p, i) =>
        `<span class="map-stop-chip"><span class="map-stop-num">${i+1}</span>${p.name}</span>`
      ).join('<span style="color:var(--border-lt);font-size:10px;align-self:center">›</span>');
    });
  } catch(e) {
    document.getElementById('route-kakao-map').innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:440px;color:var(--muted);font-size:13px">동선 정보를 불러올 수 없습니다.</div>';
  }
}

document.getElementById('map-modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('map-modal-overlay')) closeRouteMap();
});

initNav();
fetchRoutes();
</script>
