<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문화 장소 — CultureRoute</title>
<link rel="icon" type="image/svg+xml" href="/static/culture/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
{% if KAKAO_JS_KEY %}<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey={{ KAKAO_JS_KEY }}"></script>{% endif %}
<style>
  :root {
    --ink: #0E1520; --paper: #EBEBEB; --accent: #10367D; --accent-lt: #1D49A6;
    --gold: #B8902A; --muted: #626A82; --white: #FFFFFF;
    --border: #C8C8D4; --border-lt: #DDDDE8; --navy-wash: #E6EAF4;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--paper); color: var(--ink); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg width='56' height='56' viewBox='0 0 56 56' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%2310367D' stroke-width='0.4' opacity='1'%3E%3Crect x='14' y='14' width='28' height='28' transform='rotate(45 28 28)'/%3E%3C/g%3E%3C/svg%3E"); opacity: 0.055; pointer-events: none; z-index: 0; }

  /* ── NAV ── */
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 18px 52px; background: rgba(235,235,235,0.90); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); }
  .logo { font-family: 'Noto Serif KR', serif; font-size: 17px; font-weight: 600; letter-spacing: 0.01em; color: var(--ink); text-decoration: none; display: flex; align-items: center; gap: 6px; }
  .logo-mark { width: 22px; height: 22px; border: 1.5px solid var(--accent); display: inline-flex; align-items: center; justify-content: center; font-size: 11px; color: var(--accent); font-family: 'Noto Serif KR', serif; font-weight: 600; }
  .logo span { color: var(--accent); }
  nav ul { list-style: none; display: flex; gap: 38px; }
  nav ul a { font-size: 12.5px; font-weight: 400; letter-spacing: 0.05em; color: var(--muted); text-decoration: none; transition: color 0.2s; position: relative; }
  nav ul a::after { content: ''; position: absolute; bottom: -3px; left: 0; right: 0; height: 1px; background: var(--accent); transform: scaleX(0); transition: transform 0.2s; }
  nav ul a:hover, nav ul a.active { color: var(--accent); }
  nav ul a:hover::after, nav ul a.active::after { transform: scaleX(1); }
  nav ul a.nav-journey-btn { background: var(--accent); color: var(--white); padding: 8px 18px; }
  nav ul a.nav-journey-btn::after { display: none; }
  nav ul a.nav-journey-btn:hover { background: var(--accent-lt); color: var(--white); }
  .btn-primary { display: inline-flex; align-items: center; gap: 10px; padding: 14px 34px; background: var(--accent); color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 12.5px; font-weight: 400; letter-spacing: 0.08em; text-decoration: none; border: 1.5px solid var(--accent); cursor: pointer; transition: background 0.22s, transform 0.15s; }
  .btn-primary:hover { background: var(--accent-lt); border-color: var(--accent-lt); transform: translateY(-1px); }

  /* ── PAGE HEADER ── */
  .page-header { padding: 112px 52px 0; position: relative; z-index: 1; }
  .page-eyebrow { font-size: 10px; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
  .page-eyebrow::before { content: ''; display: block; width: 20px; height: 1px; background: var(--accent); flex-shrink: 0; }
  .page-title { font-family: 'Noto Serif KR', serif; font-size: 38px; font-weight: 300; letter-spacing: -0.025em; line-height: 1.3; margin-bottom: 8px; }
  .page-count { font-size: 12px; color: var(--muted); margin-top: 8px; }

  /* ── SEARCH BAR ── */
  .search-section { padding: 28px 52px 0; position: relative; z-index: 1; }
  .search-wrap { display: flex; gap: 0; max-width: 480px; }
  .search-input {
    flex: 1; padding: 10px 16px;
    border: 1px solid var(--border); border-right: none;
    background: var(--white); color: var(--ink);
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    outline: none; transition: border-color .18s;
  }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: var(--accent); }
  .search-btn {
    padding: 10px 20px;
    background: var(--accent); color: var(--white);
    border: 1px solid var(--accent);
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    cursor: pointer; transition: background .18s; white-space: nowrap;
  }
  .search-btn:hover { background: var(--accent-lt); }
  .search-clear {
    padding: 10px 14px;
    border: 1px solid var(--border); border-left: none;
    background: var(--white); color: var(--muted);
    font-size: 14px; cursor: pointer; transition: all .18s;
    display: none;
  }
  .search-clear:hover { color: var(--ink); }

  /* ── FILTER BAR ── */
  .filter-section { padding: 20px 52px 0; position: relative; z-index: 1; }
  .filter-group { margin-bottom: 16px; }
  .filter-label { font-size: 9.5px; letter-spacing: 0.16em; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
  .filter-pills { display: flex; flex-wrap: wrap; gap: 8px; }
  .pill { padding: 6px 16px; border: 1px solid var(--border); background: var(--white); color: var(--muted); font-size: 11.5px; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.18s; }
  .pill:hover { border-color: var(--accent); color: var(--accent); }
  .pill.active { background: var(--accent); border-color: var(--accent); color: var(--white); }
  .filter-divider { height: 1px; background: var(--border-lt); margin: 24px 0 0; }

  /* ── PLACE GRID ── */
  .grid-section { padding: 0 0 80px; position: relative; z-index: 1; }
  .grid-header { padding: 32px 52px 0; display: flex; align-items: center; justify-content: space-between; }
  .place-grid { display: grid; grid-template-columns: repeat(3, 1fr); border-top: 1px solid var(--border); margin-top: 28px; }
  .place-card { border-right: 1px solid var(--border-lt); border-bottom: 1px solid var(--border-lt); overflow: hidden; cursor: pointer; transition: background 0.22s; background: var(--white); }
  .place-card:nth-child(3n) { border-right: none; }
  .place-card:hover { background: var(--navy-wash); }
  .place-img { width: 100%; height: 200px; overflow: hidden; border-bottom: 1px solid var(--border-lt); position: relative; background: linear-gradient(135deg, #DCE4F2 0%, #C8D4EC 100%); }
  .place-img img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .3s ease; }
  .place-card:hover .place-img img { transform: scale(1.04); }
  .place-body { padding: 24px 28px; }
  .place-tags { display: flex; gap: 7px; margin-bottom: 12px; }
  .tag { font-size: 9.5px; letter-spacing: 0.12em; padding: 3px 10px; border: 1px solid var(--border); color: var(--muted); text-transform: uppercase; }
  .tag-indoor { border-color: rgba(16,54,125,0.25); color: var(--accent); background: rgba(16,54,125,0.04); }
  .place-name { font-family: 'Noto Serif KR', serif; font-size: 18px; font-weight: 400; color: var(--ink); margin-bottom: 7px; line-height: 1.35; }
  .place-addr { font-size: 11.5px; color: var(--muted); margin-bottom: 16px; }
  .place-meta { display: flex; align-items: center; justify-content: space-between; }
  .rating { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--gold); }
  .place-fee { font-size: 12px; color: var(--muted); }

  /* ── VIEW TOGGLE ── */
  .view-toggle { padding:20px 52px 0;display:flex;gap:0;position:relative;z-index:1; }
  .view-btn { padding:8px 22px;border:1px solid var(--border);background:var(--white);color:var(--muted);font-size:11.5px;font-family:'DM Sans',sans-serif;letter-spacing:.05em;cursor:pointer;transition:all .18s; }
  .view-btn:first-child { border-right:none; }
  .view-btn.active { background:var(--accent);border-color:var(--accent);color:var(--white); }
  .view-btn:hover:not(.active) { border-color:var(--accent);color:var(--accent); }
  #map-container { padding:0 52px 80px;position:relative;z-index:1; }

  /* ── STATES ── */
  .state-box { grid-column: 1 / -1; padding: 80px 52px; text-align: center; color: var(--muted); }
  .state-box .state-char { font-family: 'Noto Serif KR', serif; font-size: 52px; color: rgba(16,54,125,0.12); margin-bottom: 16px; }
  .state-box p { font-size: 14px; line-height: 1.8; }

  /* ── PAGINATION ── */
  .pagination { display: flex; justify-content: center; gap: 6px; padding: 32px 0 48px; flex-wrap: wrap; }
  .page-btn { min-width: 36px; height: 36px; padding: 0 10px; border: 1px solid var(--border); background: var(--white); color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; transition: all .18s; }
  .page-btn:hover { border-color: var(--accent); color: var(--accent); }
  .page-btn.active { background: var(--accent); border-color: var(--accent); color: var(--white); }
  .page-btn:disabled { opacity: .35; cursor: default; pointer-events: none; }

  /* ── BOOKMARK BTN (card) ── */
  .bm-btn { position:absolute; top:10px; right:10px; z-index:2; width:32px; height:32px; border-radius:50%; background:rgba(255,255,255,.88); border:1px solid var(--border); font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .18s; line-height:1; }
  .bm-btn:hover { background:var(--white); border-color:var(--accent); }
  .bm-btn.active { background:var(--accent); border-color:var(--accent); color:white; }
  .place-img { position:relative; }

  /* ── SORT STRIP ── */
  .sort-strip { padding: 16px 52px 0; display: flex; align-items: center; gap: 8px; position: relative; z-index: 1; }
  .sort-label { font-size: 9.5px; letter-spacing: .14em; color: var(--muted); text-transform: uppercase; flex-shrink: 0; margin-right: 4px; }
  .sort-pill { padding: 5px 14px; border: 1px solid var(--border); background: var(--white); color: var(--muted); font-size: 11px; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all .18s; }
  .sort-pill:hover { border-color: var(--accent); color: var(--accent); }
  .sort-pill.active { background: var(--accent); border-color: var(--accent); color: var(--white); }

  /* ── CARD HIGHLIGHT ── */
  .place-card.map-highlight { background:var(--navy-wash); outline:2px solid var(--accent); }

  /* ── FOOTER ── */
  footer { border-top: 1px solid var(--border); padding: 52px; display: flex; align-items: center; justify-content: space-between; background: var(--accent); position: relative; overflow: hidden; z-index: 1; }
  footer::before { content: ''; position: absolute; inset: 0; background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23ffffff' stroke-width='0.4' opacity='1'%3E%3Crect x='10' y='10' width='20' height='20' transform='rotate(45 20 20)'/%3E%3C/g%3E%3C/svg%3E"); opacity: 0.06; pointer-events: none; }
  .footer-logo { font-family: 'Noto Serif KR', serif; font-size: 16px; color: white; display: flex; align-items: center; gap: 7px; position: relative; z-index: 1; }
  .footer-logo .logo-mark { border-color: rgba(255,255,255,0.5); color: rgba(255,255,255,0.7); }
  .footer-logo span { color: rgba(255,255,255,0.55); }
  .footer-copy { font-size: 12px; color: rgba(255,255,255,0.4); position: relative; z-index: 1; }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="/" class="logo">
    <span class="logo-mark">文</span>
    Culture<span>Route</span>
  </a>
  <ul>
    <li><a href="/places/" class="active">문화 장소</a></li>
    <li><a href="/app/?go=journey" class="nav-journey-btn">여행 떠나기</a></li>
    <li><a href="/routes/">커뮤니티</a></li>
  </ul>
  <div id="nav-auth" style="display:flex;align-items:center;gap:10px">
    <a href="/login/" class="btn-primary" style="font-size:11.5px;padding:9px 22px;">로그인</a>
  </div>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
  <p class="page-eyebrow">문화 장소</p>
  <h1 class="page-title">서울·경기 문화 명소</h1>
  <p class="page-count" id="place-count">불러오는 중…</p>
</div>

<!-- SEARCH BAR -->
<div class="search-section">
  <div class="search-wrap">
    <input type="text" id="search-input" class="search-input"
      placeholder="장소명으로 검색…"
      oninput="onSearchInput()"
      onkeydown="if(event.key==='Enter')doSearch()">
    <button class="search-btn" onclick="doSearch()">검색</button>
    <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
  </div>
</div>

<!-- FILTER BAR -->
<div class="filter-section">
  <div class="filter-group">
    <p class="filter-label">시대</p>
    <div class="filter-pills" id="filter-era">
      <button class="pill active" data-val="">전체</button>
      <button class="pill" data-val="three_kingdoms">삼국시대</button>
      <button class="pill" data-val="goryeo">고려시대</button>
      <button class="pill" data-val="joseon">조선시대</button>
      <button class="pill" data-val="japanese">일제강점기</button>
      <button class="pill" data-val="modern">현대</button>
    </div>
  </div>
  <div class="filter-group">
    <p class="filter-label">카테고리</p>
    <div class="filter-pills" id="filter-category">
      <button class="pill active" data-val="">전체</button>
      <button class="pill" data-val="historic">역사 유적</button>
      <button class="pill" data-val="museum">박물관·미술관</button>
      <button class="pill" data-val="palace">궁궐·사찰</button>
      <button class="pill" data-val="etc">기타</button>
    </div>
  </div>
  <div class="filter-group" style="display:flex;gap:48px;align-items:flex-start">
    <div>
      <p class="filter-label">지역</p>
      <div class="filter-pills" id="filter-region">
        <button class="pill active" data-val="">전체</button>
        <button class="pill" data-val="seoul">서울</button>
        <button class="pill" data-val="gyeonggi">경기</button>
      </div>
    </div>
    <div>
      <p class="filter-label">실내/실외</p>
      <div class="filter-pills" id="filter-indoor">
        <button class="pill active" data-val="">전체</button>
        <button class="pill" data-val="true">실내</button>
        <button class="pill" data-val="false">실외</button>
      </div>
    </div>
  </div>
  <div class="filter-divider"></div>
</div>

<!-- VIEW TOGGLE -->
<div class="view-toggle">
  <button class="view-btn active" id="view-grid-btn" onclick="setView('grid')">그리드</button>
  <button class="view-btn" id="view-map-btn" onclick="setView('map')">지도</button>
</div>

<!-- SORT BAR -->
<div class="sort-strip">
  <span class="sort-label">정렬</span>
  <button class="sort-pill active" data-sort="">기본</button>
  <button class="sort-pill" data-sort="name">이름순</button>
  <button class="sort-pill" data-sort="rating">평점 높은순</button>
  <button class="sort-pill" data-sort="fee">입장료 낮은순</button>
</div>

<!-- PLACE GRID -->
<div class="grid-section">
  <div class="place-grid" id="place-grid">
    <div class="state-box"><p>장소를 불러오는 중…</p></div>
  </div>
  <div class="pagination" id="pagination"></div>
  <div id="map-container" style="display:none">
    <div id="kakao-map-list" style="width:100%;height:580px;border:1px solid var(--border-lt);margin-top:28px"></div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <div class="footer-logo">
    <span class="logo-mark">文</span>
    Culture<span>Route</span>
  </div>
  <p class="footer-copy">© 2025 CultureRoute · 서울6반 1조</p>
</footer>

<script>
/* ── 공통 nav 인증 ── */
function getCsrfToken() {
  return document.cookie.split(';').find(r => r.trim().startsWith('csrftoken='))?.split('=')[1] || '';
}
/* ── 북마크 상태 캐시 ── */
let myBookmarks = {}; // { place_id: bookmark_id }

async function loadMyBookmarks() {
  try {
    const res = await fetch('/api/bookmarks/');
    if (!res.ok) return;
    const data = await res.json();
    data.forEach(b => { if (b.place) myBookmarks[b.place] = b.id; });
  } catch(e) {}
}

async function toggleCardBookmark(event, placeId) {
  event.stopPropagation();
  const btn = event.currentTarget;
  if (myBookmarks[placeId]) {
    const res = await fetch(`/api/bookmarks/${myBookmarks[placeId]}/`, {
      method: 'DELETE', headers: { 'X-CSRFToken': getCsrfToken() }
    });
    if (res.ok || res.status === 204) {
      delete myBookmarks[placeId];
      btn.textContent = '☆'; btn.classList.remove('active');
    }
  } else {
    const res = await fetch('/api/bookmarks/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrfToken() },
      body: JSON.stringify({ place: placeId })
    });
    if (res.status === 201) {
      const d = await res.json();
      myBookmarks[placeId] = d.id;
      btn.textContent = '★'; btn.classList.add('active');
    } else if (res.status === 401 || res.status === 403) {
      location.href = `/login/?next=${encodeURIComponent(location.pathname)}`;
    }
  }
}

async function initNav() {
  try {
    const res = await fetch('/api/accounts/me/');
    const nav = document.getElementById('nav-auth');
    if (res.ok) {
      const u = await res.json();
      nav.innerHTML = `
        <a href="/accounts/profile/${u.username}/" style="font-size:12px;color:var(--muted);letter-spacing:.03em;text-decoration:none" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">${u.username} ›</a>
        <button onclick="doLogout()" style="padding:8px 18px;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11.5px;letter-spacing:.06em;border:1px solid var(--border);cursor:pointer;transition:all .2s" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">로그아웃</button>`;
      loadMyBookmarks();
    } else {
      nav.innerHTML = `<a href="/login/?next=${encodeURIComponent(location.pathname)}" style="display:inline-flex;align-items:center;padding:9px 22px;background:var(--accent);color:#fff;font-family:'DM Sans',sans-serif;font-size:11.5px;letter-spacing:.08em;text-decoration:none;border:1.5px solid var(--accent)">로그인</a>`;
    }
  } catch(e) {}
}
async function doLogout() {
  await fetch('/api/accounts/logout/', {method:'POST', headers:{'X-CSRFToken':getCsrfToken()}});
  location.href = '/';
}
initNav();

const NO_IMG = '/static/culture/images/no_map_image.png';
const filters = { era: '', category: '', region: '', is_indoor: '', q: '' };

/* ── 페이지네이션 / 정렬 상태 ── */
const PAGE_SIZE = 15;
let allPlaces = [];
let currentPage = 1;
let sortBy = '';

function getSortedPlaces() {
  if (!sortBy) return allPlaces;
  const arr = [...allPlaces];
  if (sortBy === 'name') arr.sort((a, b) => a.name.localeCompare(b.name, 'ko'));
  else if (sortBy === 'rating') arr.sort((a, b) => (b.avg_rating || 0) - (a.avg_rating || 0));
  else if (sortBy === 'fee') arr.sort((a, b) => a.entrance_fee - b.entrance_fee);
  return arr;
}

/* ── 지도 관련 ── */
let kakaoMap = null;
let mapMarkers = [];
let currentView = 'grid';

function setView(v) {
  currentView = v;
  document.getElementById('view-grid-btn').classList.toggle('active', v === 'grid');
  document.getElementById('view-map-btn').classList.toggle('active', v === 'map');
  document.getElementById('place-grid').style.display = v === 'grid' ? '' : 'none';
  document.getElementById('pagination').style.display = v === 'grid' ? '' : 'none';
  document.getElementById('map-container').style.display = v === 'map' ? '' : 'none';
  if (v === 'map') {
    initKakaoMap();
    updateMapMarkers(allPlaces);
  }
}

function initKakaoMap() {
  if (!window.kakao || !window.kakao.maps) {
    const el = document.getElementById('kakao-map-list');
    if (el) el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:13px">지도를 불러올 수 없습니다.</div>';
    return;
  }
  if (kakaoMap) { kakaoMap.relayout(); return; }
  const container = document.getElementById('kakao-map-list');
  kakaoMap = new kakao.maps.Map(container, {
    center: new kakao.maps.LatLng(37.5665, 126.9780),
    level: 8
  });
}

function updateMapMarkers(places) {
  if (!kakaoMap) return;
  mapMarkers.forEach(m => m.setMap(null));
  mapMarkers = [];
  if (!places.length) return;
  const bounds = new kakao.maps.LatLngBounds();
  places.forEach(p => {
    if (!p.latitude || !p.longitude) return;
    const pos = new kakao.maps.LatLng(parseFloat(p.latitude), parseFloat(p.longitude));
    const marker = new kakao.maps.Marker({ position: pos });
    marker.setMap(kakaoMap);
    const iw = new kakao.maps.InfoWindow({
      content: `<div style="padding:8px 12px;font-size:12px;font-family:sans-serif;min-width:110px">
        <a href="/places/${p.id}/" style="color:#10367D;font-weight:500;text-decoration:none">${p.name}</a>
        <br><span style="color:#888;font-size:11px">${p.category_display || ''}</span>
      </div>`
    });
    kakao.maps.event.addListener(marker, 'click', () => {
      mapMarkers.forEach(m => { if (m._iw) m._iw.close(); });
      iw.open(kakaoMap, marker);
      // 리스트 뷰가 표시 중이면 해당 카드 하이라이트
      document.querySelectorAll('.place-card').forEach(c => c.classList.remove('map-highlight'));
      const card = document.querySelector(`.place-card[data-place-id="${p.id}"]`);
      if (card) {
        card.classList.add('map-highlight');
        card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    });
    marker._iw = iw;
    mapMarkers.push(marker);
    bounds.extend(pos);
  });
  if (mapMarkers.length > 0) kakaoMap.setBounds(bounds);
}

function initPills(groupId, key) {
  document.getElementById(groupId).querySelectorAll('.pill').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById(groupId).querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filters[key] = btn.dataset.val;
      fetchPlaces();
    });
  });
}

/* ── 검색 핸들러 ── */
function onSearchInput() {
  const val = document.getElementById('search-input').value;
  document.getElementById('search-clear').style.display = val ? 'block' : 'none';
}

function doSearch() {
  filters.q = document.getElementById('search-input').value.trim();
  fetchPlaces();
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').style.display = 'none';
  filters.q = '';
  fetchPlaces();
}

function buildQuery() {
  const params = new URLSearchParams();
  if (filters.era) params.set('era', filters.era);
  if (filters.category) params.set('category', filters.category);
  if (filters.region) params.set('region', filters.region);
  if (filters.is_indoor !== '') params.set('is_indoor', filters.is_indoor);
  if (filters.q) params.set('q', filters.q);
  return params.toString();
}

function placeCardHTML(p) {
  const fee = p.entrance_fee === 0 ? '무료' : p.entrance_fee.toLocaleString() + '원';
  const ratingStr = p.avg_rating ? `★ ${p.avg_rating}` : '★ —';
  const isBm = !!myBookmarks[p.id];
  return `<div class="place-card" data-place-id="${p.id}" onclick="location.href='/places/${p.id}/'">
    <div class="place-img">
      ${p.image_url
        ? `<img src="${p.image_url}" alt="${p.name}" loading="lazy" onerror="this.parentElement.innerHTML='<span style=\'font-size:32px;opacity:.35\'>景</span><span style=\'position:absolute;bottom:12px;left:0;right:0;text-align:center;font-size:10px;letter-spacing:.12em;color:#626A82\'>이미지 없음</span>'">`
        : `<span style="font-size:32px;opacity:.35">景</span><span style="position:absolute;bottom:12px;left:0;right:0;text-align:center;font-size:10px;letter-spacing:.12em;color:#626A82">이미지 없음</span>`}
      <button class="bm-btn${isBm ? ' active' : ''}" title="북마크"
        onclick="toggleCardBookmark(event, ${p.id})">${isBm ? '★' : '☆'}</button>
    </div>
    <div class="place-body">
      <div class="place-tags">
        <span class="tag">${p.category_display || ''}</span>
        <span class="tag tag-indoor">${p.is_indoor ? '실내' : '실외'}</span>
      </div>
      <h3 class="place-name">${p.name}</h3>
      <p class="place-addr">${p.address}</p>
      <div class="place-meta">
        <span class="rating">${ratingStr}</span>
        <span class="place-fee">${fee}</span>
      </div>
    </div>
  </div>`;
}

/* ── 페이지네이션 렌더 ── */
function renderPagination(totalPages, current) {
  const el = document.getElementById('pagination');
  if (totalPages <= 1) { el.innerHTML = ''; return; }

  let start = Math.max(1, current - 2);
  let end   = Math.min(totalPages, start + 4);
  if (end - start < 4) start = Math.max(1, end - 4);

  const btn = (label, page, disabled, active) =>
    `<button class="page-btn${active ? ' active' : ''}"
      onclick="goPage(${page})" ${disabled ? 'disabled' : ''}>${label}</button>`;

  let html = '';
  html += btn('«', 1,             current === 1,          false);
  html += btn('‹', current - 1,  current === 1,          false);
  for (let i = start; i <= end; i++)
    html += btn(i, i, false, i === current);
  html += btn('›', current + 1,  current === totalPages, false);
  html += btn('»', totalPages,   current === totalPages, false);

  el.innerHTML = html;
}

function goPage(page) {
  currentPage = page;
  const sorted = getSortedPlaces();
  const start = (page - 1) * PAGE_SIZE;
  const pageData = sorted.slice(start, start + PAGE_SIZE);
  const grid = document.getElementById('place-grid');
  grid.innerHTML = pageData.map(placeCardHTML).join('');
  renderPagination(Math.ceil(sorted.length / PAGE_SIZE), page);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function fetchPlaces() {
  const grid = document.getElementById('place-grid');
  const countEl = document.getElementById('place-count');
  document.getElementById('pagination').innerHTML = '';
  grid.innerHTML = '<div class="state-box"><p>장소를 불러오는 중…</p></div>';

  const q = buildQuery();
  const url = q ? `/api/places/filter/?${q}` : '/api/places/';
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    allPlaces = data;
    currentPage = 1;
    countEl.textContent = `총 ${data.length}곳`;
    if (!data.length) {
      grid.innerHTML = '<div class="state-box"><p>조건에 맞는 장소가 없습니다.<br>다른 필터를 선택해 보세요.</p></div>';
      if (currentView === 'map') updateMapMarkers([]);
      return;
    }
    goPage(1);
    if (currentView === 'map') updateMapMarkers(allPlaces);
  } catch(e) {
    countEl.textContent = '';
    grid.innerHTML = '<div class="state-box"><p>장소를 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.</p></div>';
  }
}

initPills('filter-era', 'era');
initPills('filter-category', 'category');
initPills('filter-region', 'region');
initPills('filter-indoor', 'is_indoor');

document.querySelectorAll('.sort-pill').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    sortBy = btn.dataset.sort;
    goPage(1);
  });
});

fetchPlaces();
</script>
