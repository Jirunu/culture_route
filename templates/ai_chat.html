<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 챗봇 — CultureRoute</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:        #0E1520;
    --paper:      #EBEBEB;
    --accent:     #10367D;
    --accent-lt:  #1D49A6;
    --accent-dim: rgba(16,54,125,0.08);
    --gold:       #B8902A;
    --muted:      #626A82;
    --card-bg:    #F4F4F7;
    --white:      #FFFFFF;
    --border:     #C8C8D4;
    --border-lt:  #DDDDE8;
    --navy-wash:  #E6EAF4;
    --danger:     #C0392B;
    --success:    #1D6A40;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='56' height='56' viewBox='0 0 56 56' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%2310367D' stroke-width='0.4' opacity='1'%3E%3Crect x='14' y='14' width='28' height='28' transform='rotate(45 28 28)'/%3E%3C/g%3E%3C/svg%3E");
    opacity: 0.055;
    pointer-events: none;
    z-index: 0;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 52px;
    background: rgba(235,235,235,0.90);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }
  .logo { font-family: 'Noto Serif KR', serif; font-size: 17px; font-weight: 600; color: var(--ink); text-decoration: none; }
  .nav-links { display: flex; gap: 28px; align-items: center; }
  .nav-links a { font-size: 13px; letter-spacing: 0.06em; color: var(--muted); text-decoration: none; text-transform: uppercase; transition: color .2s; }
  .nav-links a:hover, .nav-links a.active { color: var(--accent); }
  #nav-auth { display: flex; gap: 12px; align-items: center; }
  .btn-nav { font-size: 12px; padding: 7px 18px; border-radius: 2px; cursor: pointer; letter-spacing: 0.08em; text-transform: uppercase; border: 1px solid var(--accent); }
  .btn-nav.outline { background: transparent; color: var(--accent); }
  .btn-nav.outline:hover { background: var(--accent-dim); }
  .btn-nav.fill { background: var(--accent); color: var(--white); }
  .btn-nav.fill:hover { background: var(--accent-lt); }

  /* ── LAYOUT ── */
  .page {
    max-width: 900px;
    margin: 0 auto;
    padding: 104px 24px 60px;
    position: relative; z-index: 1;
  }
  h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: 26px; font-weight: 600;
    margin-bottom: 6px;
  }
  .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 36px; }

  /* ── TABS ── */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
  .tab-btn {
    font-size: 13px; letter-spacing: 0.05em; text-transform: uppercase;
    padding: 10px 22px; background: none; border: none; border-bottom: 2px solid transparent;
    cursor: pointer; color: var(--muted); margin-bottom: -1px; transition: all .2s;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── CHAT PANEL ── */
  .chat-window {
    background: var(--white);
    border: 1px solid var(--border-lt);
    border-radius: 6px;
    height: 420px;
    overflow-y: auto;
    padding: 20px;
    margin-bottom: 16px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .msg { display: flex; flex-direction: column; gap: 4px; max-width: 78%; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.bot  { align-self: flex-start; align-items: flex-start; }
  .bubble {
    padding: 12px 16px; border-radius: 6px;
    font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word;
  }
  .msg.user .bubble { background: var(--accent); color: var(--white); }
  .msg.bot  .bubble { background: var(--card-bg); color: var(--ink); border: 1px solid var(--border-lt); }
  .msg.bot.blocked .bubble { background: #FFF3F3; border-color: #F5C6C6; color: var(--danger); }

  .badge {
    font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 2px 8px; border-radius: 20px; font-weight: 500;
  }
  .badge.valid   { background: #D4EDDA; color: var(--success); }
  .badge.blocked { background: #F8D7DA; color: var(--danger); }

  .score-chip {
    font-size: 11px; color: var(--muted);
    display: flex; align-items: center; gap: 6px; margin-top: 4px;
  }
  .score-bar { width: 80px; height: 4px; background: var(--border-lt); border-radius: 2px; overflow: hidden; }
  .score-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .6s; }

  /* ── STATUS ── */
  #status-bar {
    font-size: 12px; color: var(--muted);
    display: flex; align-items: center; gap: 8px;
    min-height: 20px; margin-bottom: 12px;
  }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #status-bar.loading .spinner { display: block; }

  /* ── INPUT ── */
  .input-row { display: flex; gap: 10px; }
  .input-row textarea {
    flex: 1; padding: 12px 14px;
    border: 1px solid var(--border); border-radius: 4px;
    font-family: inherit; font-size: 14px; resize: none;
    background: var(--white); color: var(--ink);
    outline: none; transition: border-color .2s;
    line-height: 1.5;
  }
  .input-row textarea:focus { border-color: var(--accent); }
  .btn-send {
    padding: 0 22px; background: var(--accent); color: var(--white);
    border: none; border-radius: 4px; font-size: 13px;
    letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer; transition: background .2s; white-space: nowrap;
  }
  .btn-send:hover { background: var(--accent-lt); }
  .btn-send:disabled { background: var(--border); cursor: not-allowed; }

  /* ── IMAGE PANEL ── */
  .image-panel { display: none; }
  .image-panel.active { display: block; }
  .img-input-row { display: flex; gap: 10px; margin-bottom: 20px; }
  .img-input-row input {
    flex: 1; padding: 12px 14px;
    border: 1px solid var(--border); border-radius: 4px;
    font-family: inherit; font-size: 14px;
    background: var(--white); color: var(--ink); outline: none;
    transition: border-color .2s;
  }
  .img-input-row input:focus { border-color: var(--accent); }
  .btn-generate {
    padding: 0 22px; background: var(--gold); color: var(--white);
    border: none; border-radius: 4px; font-size: 13px;
    letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer; transition: opacity .2s; white-space: nowrap;
  }
  .btn-generate:hover { opacity: .85; }
  .btn-generate:disabled { opacity: .4; cursor: not-allowed; }
  #img-status { font-size: 12px; color: var(--muted); min-height: 18px; margin-bottom: 14px; }
  #img-result img { max-width: 100%; border-radius: 6px; border: 1px solid var(--border-lt); }

  .empty-hint {
    flex: 1; display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 13px;
  }
</style>
</head>
<body>

<nav>
  <a class="logo" href="/">CultureRoute</a>
  <div class="nav-links">
    <a href="/places/">장소</a>
    <a href="/routes/">코스</a>
    <a href="/ai/" class="active">AI 챗봇</a>
  </div>
  <div id="nav-auth"></div>
</nav>

<div class="page">
  <h1>AI 어시스턴트</h1>
  <p class="subtitle">Guardrail이 적용된 안전한 AI 챗봇 · 이미지 생성</p>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('chat', this)">챗봇</button>
    <button class="tab-btn" onclick="switchTab('image', this)">이미지 생성</button>
  </div>

  <!-- ── 챗봇 탭 ── -->
  <div id="tab-chat">
    <div class="chat-window" id="chat-window">
      <div class="empty-hint" id="empty-hint">질문을 입력하면 AI가 답변합니다.</div>
    </div>

    <div id="status-bar">
      <div class="spinner" id="spinner"></div>
      <span id="status-text"></span>
    </div>

    <div class="input-row">
      <textarea id="question-input" rows="2" placeholder="질문을 입력하세요…"></textarea>
      <button class="btn-send" id="send-btn" onclick="sendMessage()">전송</button>
    </div>
  </div>

  <!-- ── 이미지 탭 ── -->
  <div id="tab-image" class="image-panel">
    <div class="img-input-row">
      <input type="text" id="img-prompt" placeholder="생성할 이미지를 설명하세요 (영문 권장)…">
      <button class="btn-generate" id="gen-btn" onclick="generateImage()">생성</button>
    </div>
    <div id="img-status"></div>
    <div id="img-result"></div>
  </div>
</div>

<script>
// ── 유틸 ──────────────────────────────────────────────────────────────────────
function getCsrfToken() {
  return document.cookie.split(';')
    .map(c => c.trim())
    .find(c => c.startsWith('csrftoken='))
    ?.split('=')[1] ?? '';
}

function post(url, body) {
  return fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrfToken() },
    body: JSON.stringify(body),
  }).then(r => r.json());
}

// ── 네비게이션 ───────────────────────────────────────────────────────────────
async function initNav() {
  try {
    const res = await fetch('/api/accounts/me/');
    const data = await res.json();
    const authEl = document.getElementById('nav-auth');
    if (res.ok) {
      authEl.innerHTML = `<span style="font-size:13px;color:var(--muted)">${data.username}</span>
        <button class="btn-nav outline" onclick="logout()">로그아웃</button>`;
    } else {
      location.href = '/login/?next=/ai/';
    }
  } catch {}
}

async function logout() {
  await post('/api/accounts/logout/', {});
  location.reload();
}

// ── 탭 전환 ──────────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-chat').style.display  = name === 'chat'  ? 'block' : 'none';
  document.getElementById('tab-image').style.display = name === 'image' ? 'block' : 'none';
}

// ── 챗봇 ─────────────────────────────────────────────────────────────────────
const chatHistory = [];  // [{role, content}]

function setStatus(text) {
  const bar = document.getElementById('status-bar');
  const sp  = document.getElementById('spinner');
  const tx  = document.getElementById('status-text');
  if (text) {
    bar.classList.add('loading');
    sp.style.display = 'block';
  } else {
    bar.classList.remove('loading');
    sp.style.display = 'none';
  }
  tx.textContent = text;
}

function appendMsg(role, content, meta = {}) {
  const hint = document.getElementById('empty-hint');
  if (hint) hint.remove();

  const win  = document.getElementById('chat-window');
  const div  = document.createElement('div');
  div.className = `msg ${role}${meta.blocked ? ' blocked' : ''}`;

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = content;
  div.appendChild(bubble);

  if (meta.badge) {
    const b = document.createElement('span');
    b.className = `badge ${meta.badge}`;
    b.textContent = meta.badge === 'valid' ? '✓ 적절한 질문' : '✕ 부적절한 질문';
    div.appendChild(b);
  }

  if (meta.score != null) {
    const chip = document.createElement('div');
    chip.className = 'score-chip';
    chip.innerHTML = `
      적합도 <strong>${meta.score}</strong>/100
      <div class="score-bar"><div class="score-fill" style="width:${meta.score}%"></div></div>
      <span style="font-size:10px;color:var(--muted)">${meta.reason || ''}</span>`;
    div.appendChild(chip);
  }

  win.appendChild(div);
  win.scrollTop = win.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('question-input');
  const btn   = document.getElementById('send-btn');
  const question = input.value.trim();
  if (!question) return;

  input.value = '';
  btn.disabled = true;
  appendMsg('user', question);

  // Step 1: Guardrail 판단 중
  setStatus('Guardrail 판단 중…');
  let result;
  try {
    result = await post('/api/ai/chat/', { question, history: chatHistory });
  } catch (e) {
    setStatus('');
    appendMsg('bot', '오류가 발생했습니다. 다시 시도해주세요.', { badge: 'blocked', blocked: true });
    btn.disabled = false;
    return;
  }

  if (result.error) {
    setStatus('');
    appendMsg('bot', `오류: ${result.error}`, { badge: 'blocked', blocked: true });
    btn.disabled = false;
    return;
  }

  if (!result.is_valid) {
    setStatus('');
    appendMsg('bot', '부적절한 질문으로 판단되어 답변할 수 없습니다.', { badge: 'blocked', blocked: true });
    btn.disabled = false;
    return;
  }

  const answer = result.answer;

  // Step 2: 점수 계산 중
  setStatus('답변 적합도 계산 중…');
  let scoreData = { score: null, reason: '' };
  try {
    scoreData = await post('/api/ai/score/', { question, answer });
  } catch {}

  setStatus('');
  appendMsg('bot', answer, {
    badge: 'valid',
    score: scoreData.score,
    reason: scoreData.reason,
  });

  chatHistory.push({ role: 'user',      content: question });
  chatHistory.push({ role: 'assistant', content: answer });
  btn.disabled = false;
}

// Enter 전송 (Shift+Enter 줄바꿈)
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('question-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  initNav();
});

// ── 이미지 생성 ───────────────────────────────────────────────────────────────
async function generateImage() {
  const prompt  = document.getElementById('img-prompt').value.trim();
  const btn     = document.getElementById('gen-btn');
  const status  = document.getElementById('img-status');
  const result  = document.getElementById('img-result');
  if (!prompt) return;

  btn.disabled = true;
  status.textContent = '이미지 생성 중… (최대 30초 소요)';
  result.innerHTML = '';

  try {
    const data = await post('/api/ai/image/', { prompt });
    if (data.error) {
      status.textContent = `오류: ${data.error}`;
    } else {
      status.textContent = '생성 완료';
      result.innerHTML = `<img src="${data.image_url}" alt="${prompt}">`;
    }
  } catch (e) {
    status.textContent = '오류가 발생했습니다.';
  }
  btn.disabled = false;
}
</script>
</body>
</html>
