{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>(function(){var h=localStorage.getItem('cr_hide_badges')==='1';var c=localStorage.getItem('cr_hide_chatbot')==='1';if(h)document.documentElement.setAttribute('data-hide-badges','1');if(c)document.documentElement.setAttribute('data-hide-chatbot','1');})();</script>
<title>AI 챗봇 — KultureRoute</title>
<link rel="icon" type="image/png" href="/static/culture/icon.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'frontend/css/common.css' %}">
<link rel="stylesheet" href="{% static 'frontend/css/ai_chat.css' %}">
</head>
<body>

<nav>
  <a class="logo" href="/">
    <span class="logo-mark">文</span>
    Kulture<em>Route</em>
  </a>
  <ul>
    <li><a href="/places/">문화 장소</a></li>
    <li><a href="/routes/">커뮤니티</a></li>
    <li><a href="/ai/" class="active">AI 챗봇</a></li>
  </ul>
  <div style="display:flex;align-items:center;gap:18px">
    <div id="nav-auth"></div>
    <button onclick="openSettingsModal()" class="nav-gear" type="button" title="설정">⚙</button>
  </div>
</nav>

<div class="page">
  <h1 style="display:flex;align-items:center;gap:10px">
    <img src="{% static 'culture/images/character.png' %}" alt="나리" style="width:24px;height:24px;border-radius:50%;object-fit:cover;object-position:center 15%">
    나리와 대화하기
  </h1>
  <p class="subtitle">Guardrail이 적용된 안전한 AI 문화 해설 챗봇 · 이미지 생성</p>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('chat', this)">챗봇</button>
    <button class="tab-btn" onclick="switchTab('image', this)">이미지 생성</button>
  </div>

  <!-- ── 챗봇 탭 ── -->
  <div id="tab-chat">
    <div class="chat-window" id="chat-window">
      <div class="empty-hint" id="empty-hint">안녕하십니까! 문화 해설 로봇 나리입니다. 무엇이든 물어보십시오.</div>
    </div>

    <div id="status-bar">
      <div class="spinner" id="spinner"></div>
      <span id="status-text"></span>
    </div>

    <div class="input-row">
      <textarea id="question-input" rows="2" placeholder="나리에게 질문해 보세요…"></textarea>
      <button class="btn-send" id="send-btn" onclick="sendMessage()">전송</button>
    </div>
  </div>

  <!-- ── 이미지 탭 ── -->
  <div id="tab-image" class="image-panel">
    <div class="img-input-row">
      <input type="text" id="img-prompt" placeholder="생성할 이미지를 설명하세요 (영문 권장)…">
      <button class="btn-generate" id="gen-btn" onclick="generateImage()">생성</button>
    </div>
    <div id="img-status"></div>
    <div id="img-result"></div>
  </div>
</div>

<script>
// ── 유틸 ──────────────────────────────────────────────────────────────────────
function getCsrfToken() {
  return document.cookie.split(';')
    .map(c => c.trim())
    .find(c => c.startsWith('csrftoken='))
    ?.split('=')[1] ?? '';
}

function post(url, body) {
  return fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrfToken() },
    body: JSON.stringify(body),
  }).then(r => r.json());
}

// ── 네비게이션 ───────────────────────────────────────────────────────────────
async function initNav() {
  try {
    const res = await fetch('/api/accounts/me/');
    const data = await res.json();
    const authEl = document.getElementById('nav-auth');
    if (res.ok) {
      authEl.innerHTML = `<img class="nav-avatar" src="${data.avatar_url || ''}" alt=""><span style="font-size:13px;color:var(--muted)">${data.username}</span>
        <button class="btn-nav outline" onclick="logout()">로그아웃</button>`;
    } else {
      location.href = '/login/?next=/ai/';
    }
  } catch {}
}

async function logout() {
  await post('/api/accounts/logout/', {});
  location.reload();
}

// ── 탭 전환 ──────────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-chat').style.display  = name === 'chat'  ? 'block' : 'none';
  document.getElementById('tab-image').style.display = name === 'image' ? 'block' : 'none';
}

// ── 챗봇 ─────────────────────────────────────────────────────────────────────
const chatHistory = [];  // [{role, content}]

function setStatus(text) {
  const bar = document.getElementById('status-bar');
  const sp  = document.getElementById('spinner');
  const tx  = document.getElementById('status-text');
  if (text) {
    bar.classList.add('loading');
    sp.style.display = 'block';
  } else {
    bar.classList.remove('loading');
    sp.style.display = 'none';
  }
  tx.textContent = text;
}

function appendMsg(role, content, meta = {}) {
  const hint = document.getElementById('empty-hint');
  if (hint) hint.remove();

  const win  = document.getElementById('chat-window');
  const div  = document.createElement('div');
  div.className = `msg ${role}${meta.blocked ? ' blocked' : ''}`;

  if (role === 'bot') {
    const avatar = document.createElement('img');
    avatar.src = "{% static 'culture/images/character.png' %}";
    avatar.alt = '나리';
    avatar.style.cssText = 'width:13px;height:13px;border-radius:50%;object-fit:cover;object-position:center 15%;margin-bottom:4px';
    div.appendChild(avatar);
  }

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = content;
  div.appendChild(bubble);

  if (meta.badge) {
    const b = document.createElement('span');
    b.className = `badge ${meta.badge}`;
    b.textContent = meta.badge === 'valid' ? '✓ 적절한 질문' : '✕ 부적절한 질문';
    div.appendChild(b);
  }

  if (meta.score != null) {
    const chip = document.createElement('div');
    chip.className = 'score-chip';
    chip.innerHTML = `
      적합도 <strong>${meta.score}</strong>/100
      <div class="score-bar"><div class="score-fill" style="width:${meta.score}%"></div></div>
      <span style="font-size:10px;color:var(--muted)">${meta.reason || ''}</span>`;
    div.appendChild(chip);
  }

  win.appendChild(div);
  win.scrollTop = win.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('question-input');
  const btn   = document.getElementById('send-btn');
  const question = input.value.trim();
  if (!question) return;

  input.value = '';
  btn.disabled = true;
  appendMsg('user', question);

  // Step 1: Guardrail 판단 중
  setStatus('나리가 질문을 검토하는 중…');
  let result;
  try {
    result = await post('/api/ai/chat/', { question, history: chatHistory });
  } catch (e) {
    setStatus('');
    appendMsg('bot', '오류가 발생했습니다. 다시 시도해주세요.', { badge: 'blocked', blocked: true });
    btn.disabled = false;
    return;
  }

  if (result.error) {
    setStatus('');
    appendMsg('bot', `오류: ${result.error}`, { badge: 'blocked', blocked: true });
    btn.disabled = false;
    return;
  }

  if (!result.is_valid) {
    setStatus('');
    appendMsg('bot', '부적절한 질문으로 판단되어 답변할 수 없습니다.', { badge: 'blocked', blocked: true });
    btn.disabled = false;
    return;
  }

  const answer = result.answer;

  // Step 2: 점수 계산 중
  setStatus('나리가 답변을 다듬는 중…');
  let scoreData = { score: null, reason: '' };
  try {
    scoreData = await post('/api/ai/score/', { question, answer });
  } catch {}

  setStatus('');
  appendMsg('bot', answer, {
    badge: 'valid',
    score: scoreData.score,
    reason: scoreData.reason,
  });

  chatHistory.push({ role: 'user',      content: question });
  chatHistory.push({ role: 'assistant', content: answer });
  btn.disabled = false;
}

// Enter 전송 (Shift+Enter 줄바꿈)
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('question-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  initNav();
});

// ── 이미지 생성 ───────────────────────────────────────────────────────────────
async function generateImage() {
  const prompt  = document.getElementById('img-prompt').value.trim();
  const btn     = document.getElementById('gen-btn');
  const status  = document.getElementById('img-status');
  const result  = document.getElementById('img-result');
  if (!prompt) return;

  btn.disabled = true;
  status.textContent = '이미지 생성 중… (최대 30초 소요)';
  result.innerHTML = '';

  try {
    const data = await post('/api/ai/image/', { prompt });
    if (data.error) {
      status.textContent = `오류: ${data.error}`;
    } else {
      status.textContent = '생성 완료';
      result.innerHTML = `<img src="${data.image_url}" alt="${prompt}">`;
    }
  } catch (e) {
    status.textContent = '오류가 발생했습니다.';
  }
  btn.disabled = false;
}
</script>
<!-- SETTINGS MODAL -->
<div class="settings-modal-overlay" id="settings-modal-overlay" onclick="if(event.target===this)closeSettingsModal()">
  <div class="settings-modal">
    <div class="settings-modal-header">
      <span class="settings-modal-title">설정</span>
      <button class="settings-modal-close" onclick="closeSettingsModal()">✕</button>
    </div>
    <div class="settings-modal-body">
      <div class="settings-row">
        <div class="settings-info">
          <p class="settings-label">칭호 표시</p>
          <p class="settings-desc">끄면 닉네임 옆 칭호가 화면에서 보이지 않습니다.</p>
        </div>
        <button class="toggle-switch" id="toggle-badges" type="button" role="switch" aria-checked="false">
          <span class="toggle-knob"></span>
        </button>
      </div>
      <div class="settings-row">
        <div class="settings-info">
          <p class="settings-label">나리 챗봇 표시</p>
          <p class="settings-desc">끄면 우측 하단 AI 캐릭터 "나리" 챗봇 버튼이 보이지 않습니다.</p>
        </div>
        <button class="toggle-switch" id="toggle-chatbot" type="button" role="switch" aria-checked="false">
          <span class="toggle-knob"></span>
        </button>
      </div>
    </div>
  </div>
</div>
<script>
function setToggleUI(btn, on) {
  btn.classList.toggle('on', on);
  btn.setAttribute('aria-checked', on ? 'true' : 'false');
}
function openSettingsModal() {
  document.getElementById('settings-modal-overlay').classList.add('open');
  setToggleUI(document.getElementById('toggle-badges'), localStorage.getItem('cr_hide_badges') !== '1');
  setToggleUI(document.getElementById('toggle-chatbot'), localStorage.getItem('cr_hide_chatbot') !== '1');
}
function closeSettingsModal() {
  document.getElementById('settings-modal-overlay').classList.remove('open');
}
document.getElementById('toggle-badges').addEventListener('click', () => {
  const show = !document.getElementById('toggle-badges').classList.contains('on');
  setToggleUI(document.getElementById('toggle-badges'), show);
  if (show) { localStorage.removeItem('cr_hide_badges'); document.documentElement.removeAttribute('data-hide-badges'); }
  else { localStorage.setItem('cr_hide_badges', '1'); document.documentElement.setAttribute('data-hide-badges', '1'); }
});
document.getElementById('toggle-chatbot').addEventListener('click', () => {
  const show = !document.getElementById('toggle-chatbot').classList.contains('on');
  setToggleUI(document.getElementById('toggle-chatbot'), show);
  if (show) { localStorage.removeItem('cr_hide_chatbot'); document.documentElement.removeAttribute('data-hide-chatbot'); }
  else { localStorage.setItem('cr_hide_chatbot', '1'); document.documentElement.setAttribute('data-hide-chatbot', '1'); }
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSettingsModal(); });
</script>
</body>
</html>
