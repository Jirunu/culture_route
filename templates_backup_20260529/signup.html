<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회원가입 — CultureRoute</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:#0E1520; --paper:#EBEBEB; --accent:#10367D; --accent-lt:#1D49A6;
    --muted:#626A82; --white:#FFFFFF; --border:#C8C8D4; --border-lt:#DDDDE8;
    --navy-wash:#E6EAF4; --error:#c0392b; --ok:#1a7a4a;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg width='56' height='56' viewBox='0 0 56 56' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%2310367D' stroke-width='0.4'%3E%3Crect x='14' y='14' width='28' height='28' transform='rotate(45 28 28)'/%3E%3C/g%3E%3C/svg%3E");opacity:.055;pointer-events:none;z-index:0}

  nav{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:18px 52px;background:rgba(235,235,235,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
  .logo{font-family:'Noto Serif KR',serif;font-size:17px;font-weight:600;color:var(--ink);text-decoration:none;display:flex;align-items:center;gap:6px}
  .logo-mark{width:22px;height:22px;border:1.5px solid var(--accent);display:inline-flex;align-items:center;justify-content:center;font-size:11px;color:var(--accent);font-family:'Noto Serif KR',serif;font-weight:600}
  .logo span{color:var(--accent)}
  .nav-link{font-size:12px;color:var(--muted);text-decoration:none;letter-spacing:.04em;transition:color .2s}
  .nav-link:hover{color:var(--accent)}

  .auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:52px 24px;position:relative;z-index:1}
  .auth-card{width:100%;max-width:460px;background:var(--white);border:1px solid var(--border);padding:52px 48px;animation:fadeUp .45s ease both}

  .card-logo{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:36px}
  .card-logo-mark{width:36px;height:36px;border:1.5px solid var(--accent);display:inline-flex;align-items:center;justify-content:center;font-size:16px;color:var(--accent);font-family:'Noto Serif KR',serif;font-weight:600}
  .card-logo-text{font-family:'Noto Serif KR',serif;font-size:18px;font-weight:600;color:var(--ink)}
  .card-logo-text span{color:var(--accent)}

  .card-eyebrow{font-size:9.5px;letter-spacing:.2em;color:var(--accent);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .card-eyebrow::before{content:'';display:block;width:16px;height:1px;background:var(--accent)}
  .card-title{font-family:'Noto Serif KR',serif;font-size:28px;font-weight:300;letter-spacing:-.02em;margin-bottom:36px}

  .form-group{margin-bottom:20px}
  .form-label{font-size:10px;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;margin-bottom:8px;display:block}
  .form-input{width:100%;padding:13px 18px;border:1px solid var(--border);background:var(--paper);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);transition:border-color .2s;outline:none}
  .form-input:focus{border-color:var(--accent);background:var(--white)}
  .form-input::placeholder{color:var(--border)}
  .field-hint{font-size:11px;color:var(--muted);margin-top:6px}

  .pw-match{font-size:11px;margin-top:6px;display:none}
  .pw-match.ok{color:var(--ok);display:block}
  .pw-match.ng{color:var(--error);display:block}

  .submit-btn{width:100%;padding:14px;background:var(--accent);color:var(--white);font-family:'DM Sans',sans-serif;font-size:13px;letter-spacing:.1em;border:none;cursor:pointer;transition:background .2s;margin-top:8px}
  .submit-btn:hover{background:var(--accent-lt)}
  .submit-btn:disabled{opacity:.6;cursor:not-allowed}

  .error-msg{font-size:12.5px;color:var(--error);margin-top:14px;padding:12px 16px;background:rgba(192,57,43,.06);border:1px solid rgba(192,57,43,.2);display:none}
  .error-msg.show{display:block}

  .divider{height:1px;background:var(--border-lt);margin:28px 0}
  .card-footer{text-align:center;font-size:12.5px;color:var(--muted)}
  .card-footer a{color:var(--accent);text-decoration:none;font-weight:400}
  .card-footer a:hover{text-decoration:underline}

  footer{border-top:1px solid var(--border);padding:28px 52px;display:flex;align-items:center;justify-content:space-between;background:var(--accent);position:relative;z-index:1;overflow:hidden}
  footer::before{content:'';position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23ffffff' stroke-width='0.4'%3E%3Crect x='10' y='10' width='20' height='20' transform='rotate(45 20 20)'/%3E%3C/g%3E%3C/svg%3E");opacity:.06;pointer-events:none}
  .footer-logo{font-family:'Noto Serif KR',serif;font-size:15px;color:white;display:flex;align-items:center;gap:7px;position:relative;z-index:1}
  .footer-logo .logo-mark{border-color:rgba(255,255,255,.5);color:rgba(255,255,255,.7);width:20px;height:20px;font-size:10px}
  .footer-logo span{color:rgba(255,255,255,.55)}
  .footer-copy{font-size:11px;color:rgba(255,255,255,.35);position:relative;z-index:1}

  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">
    <span class="logo-mark">文</span>
    Culture<span>Route</span>
  </a>
  <a href="/login/" class="nav-link">로그인</a>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="card-logo">
      <span class="card-logo-mark">文</span>
      <span class="card-logo-text">Culture<span>Route</span></span>
    </div>

    <p class="card-eyebrow">Sign Up</p>
    <h1 class="card-title">회원가입</h1>

    <form id="signup-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="username">아이디</label>
        <input class="form-input" id="username" type="text" placeholder="3자 이상의 아이디" autocomplete="username">
        <p class="field-hint">영문·숫자 조합, 3자 이상</p>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">비밀번호</label>
        <input class="form-input" id="password" type="password" placeholder="8자 이상의 비밀번호" autocomplete="new-password">
        <p class="field-hint">8자 이상, 숫자만으로 구성할 수 없습니다</p>
      </div>
      <div class="form-group">
        <label class="form-label" for="password2">비밀번호 확인</label>
        <input class="form-input" id="password2" type="password" placeholder="비밀번호를 다시 입력하세요" autocomplete="new-password">
        <p class="pw-match" id="pw-match"></p>
      </div>

      <div class="error-msg" id="error-msg"></div>

      <button class="submit-btn" type="submit" id="submit-btn">회원가입</button>
    </form>

    <div class="divider"></div>
    <p class="card-footer">
      이미 계정이 있으신가요? <a href="/login/">로그인</a>
    </p>
  </div>
</div>

<footer>
  <div class="footer-logo">
    <span class="logo-mark">文</span>
    Culture<span>Route</span>
  </div>
  <p class="footer-copy">© 2025 CultureRoute · 서울6반 1조</p>
</footer>

<script>
// 이미 로그인된 상태면 홈으로 이동
(async () => {
  try {
    const res = await fetch('/api/accounts/me/');
    if (res.ok) location.replace('/');
  } catch(e) {}
})();

// 비밀번호 확인 실시간 체크
document.getElementById('password2').addEventListener('input', () => {
  const pw = document.getElementById('password').value;
  const pw2 = document.getElementById('password2').value;
  const el = document.getElementById('pw-match');
  if (!pw2) { el.className = 'pw-match'; return; }
  if (pw === pw2) { el.textContent = '비밀번호가 일치합니다.'; el.className = 'pw-match ok'; }
  else           { el.textContent = '비밀번호가 일치하지 않습니다.'; el.className = 'pw-match ng'; }
});

document.getElementById('signup-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const password2 = document.getElementById('password2').value;
  const errEl = document.getElementById('error-msg');
  const btn = document.getElementById('submit-btn');

  errEl.classList.remove('show');
  btn.disabled = true;
  btn.textContent = '처리 중…';

  try {
    const res = await fetch('/api/accounts/signup/', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, password, password2})
    });
    const data = await res.json();

    if (res.ok) {
      location.href = '/';
    } else {
      errEl.textContent = data.detail || '회원가입에 실패했습니다.';
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = '회원가입';
    }
  } catch(e) {
    errEl.textContent = '서버에 연결할 수 없습니다. 잠시 후 다시 시도해 주세요.';
    errEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = '회원가입';
  }
});
</script>
</body>
</html>
